<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Wildlife - Timor Novoselsky</title>
    <style>
        body { background-color: black; color: white; font-family: 'Lora', serif; margin: 0; padding: 20px; position: relative; }
        header { text-align: center; margin-bottom: 40px; margin-top: 20px; }
        h1 { font-size: 3em; letter-spacing: 5px; text-transform: uppercase; }
        
        .backBtn {
            position: absolute;
            top: 25px;
            left: 20px;
            color: white;
            text-decoration: none;
            font-size: 16px;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .backBtn:hover { color: #ccc; }
        
        .galleryContainer { display: flex; flex-wrap: wrap; gap: 15px; max-width: 1000px; margin: 0 auto; }
        .imgSmall { width: calc(50% - 8px); height: 300px; object-fit: cover; }
        .imgLarge { width: 100%; height: 500px; object-fit: cover; }
    </style>
</head>
<body>

<a href="index.html" class="backBtn"><span>&#8592;</span> BACK</a>

<header>
    <h1>Wildlife</h1>
</header>

<div class="galleryContainer">
    <img src="https://picsum.photos/800/600?random=6" class="imgSmall">
    <img src="https://picsum.photos/800/600?random=7" class="imgSmall">
    
    <img src="https://picsum.photos/1200/500?random=8" class="imgLarge">
    
    <img src="https://picsum.photos/800/600?random=9" class="imgSmall">
    <img src="https://picsum.photos/800/600?random=10" class="imgSmall">
</div>

</body>
</html>
