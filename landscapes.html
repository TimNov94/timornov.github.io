<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Landscapes - Timor Novoselsky</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lora&display=swap');

        body { background-color: black; color: white; font-family: 'Lora', serif; margin: 0; padding: 20px; }
        
        .topVignette {
            position: fixed; top: 0; left: 0; width: 100%; height: 40px;
            background: linear-gradient(to bottom, rgba(0,0,0,1), rgba(0,0,0,0));
            z-index: 1000; pointer-events: none;
        }

        .fixedHeader {
            position: fixed; top: 0; left: 0; width: 100%; background-color: black;
            z-index: 500; padding-top: 35px; padding-bottom: 15px;
            transition: opacity 0.2s ease; opacity: 1;
        }
        .fixedHeader::after {
            content: ""; position: absolute; bottom: -60px; left: 0; width: 100%; height: 60px;
            background: linear-gradient(to bottom, black, transparent); pointer-events: none;
        }

        .backButton {
            position: absolute; top: 40px; left: 40px; color: white; text-decoration: none;
            font-size: 16px; letter-spacing: 2px; display: flex; align-items: center; gap: 8px;
        }
        
        header { text-align: center; }
        h1 { font-size: 3em; letter-spacing: 5px; text-transform: uppercase; margin: 0 0 15px 0; }
        
        .filterContainer { display: flex; justify-content: center; gap: 25px; margin-bottom: 15px; }
        .filterTag {
            color: rgba(255, 255, 255, 0.4); cursor: pointer; font-size: 15px;
            letter-spacing: 2px; text-transform: uppercase; transition: color 0.3s;
        }
        .filterTag.activeTag { color: rgba(255, 255, 255, 1); border-bottom: 1px solid white; padding-bottom: 2px; }
        
        .galleryContainer { 
            display: flex; flex-wrap: wrap; gap: 15px; max-width: 1000px; 
            margin: 240px auto 0 auto; padding-bottom: 100px;
        }
        
        .galleryImg { object-fit: cover; transition: opacity 0.5s ease, transform 0.5s ease; cursor: pointer; }
        .galleryImg:hover { transform: scale(1.01); }
        .imgSmall { width: calc(50% - 8px); height: 350px; }
        .imgLarge { width: 100%; height: 500px; }

        .lightboxOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.98); z-index: 2000; display: flex;
            flex-direction: column; justify-content: center; align-items: center;
            opacity: 0; visibility: hidden; transition: opacity 0.4s ease;
        }
        .lightboxOverlay.activeLightbox { opacity: 1; visibility: visible; }
        .lightboxImg { max-width: 90%; max-height: 75vh; object-fit: contain; box-shadow: 0 0 30px rgba(0,0,0,0.8); }
        .lightboxCaption { margin-top: 25px; color: rgba(255, 255, 255, 0.7); font-size: 18px; letter-spacing: 2px; text-align: center; max-width: 80%; }
        .closeLightbox { position: absolute; top: 30px; right: 40px; font-size: 35px; color: white; cursor: pointer; opacity: 0.6; }
    </style>
</head>
<body>

<div class="topVignette"></div>

<div id="fixedHeader" class="fixedHeader">
    <a href="index.html" class="backButton"><span>&#8592;</span> BACK</a>
    <header>
        <h1>Landscapes</h1>
        <div class="filterContainer">
            <div class="filterTag activeTag" onclick="filterGallery('all', this)">All</div>
            <div class="filterTag" onclick="filterGallery('mountains', this)">Mountains</div>
            <div class="filterTag" onclick="filterGallery('lakes', this)">Lakes</div>
            <div class="filterTag" onclick="filterGallery('forests', this)">Forests</div>
        </div>
    </header>
</div>

<div class="galleryContainer">
    <!-- שים לב ל-data-categories: אפשר לכתוב פה כמה תגיות שרוצים מופרדות ברווח -->
    <img src="https://picsum.photos/800/600?random=101" class="galleryImg imgSmall" data-categories="mountains forests" caption="Granite peaks meeting the forest edge" onclick="openLightbox(this)">
    <img src="https://picsum.photos/800/600?random=102" class="galleryImg imgSmall" data-categories="mountains" caption="Swiss peaks" onclick="openLightbox(this)">
    <img src="https://picsum.photos/1200/600?random=103" class="galleryImg imgLarge" data-categories="lakes mountains" caption="Lake reflection with mountains" onclick="openLightbox(this)">
    <img src="https://picsum.photos/800/600?random=104" class="galleryImg imgSmall" data-categories="forests" caption="Dense forest path" onclick="openLightbox(this)">
    <img src="https://picsum.photos/800/600?random=105" class="galleryImg imgSmall" data-categories="lakes" caption="Alpine lake blue waters" onclick="openLightbox(this)">
    <img src="https://picsum.photos/1200/600?random=106" class="galleryImg imgLarge" data-categories="mountains" caption="Peak views" onclick="openLightbox(this)">
</div>

<div id="lightbox" class="lightboxOverlay" onclick="closeLightbox()">
    <div class="closeLightbox">&times;</div>
    <img id="lightboxImg" class="lightboxImg" src="" alt="">
    <div id="lightboxCaption" class="lightboxCaption"></div>
</div>

<script>
    function filterGallery(category, element) {
        const tags = document.querySelectorAll('.filterTag');
        tags.forEach(tag => tag.classList.remove('activeTag'));
        element.classList.add('activeTag');
        
        const images = document.querySelectorAll('.galleryImg');
        images.forEach(img => {
            // הופך את הסטרינג לרשימה (Array) של תגיות
            const categories = img.getAttribute('data-categories').split(' ');
            
            if (category === 'all' || categories.includes(category)) {
                img.style.display = '';
                setTimeout(() => img.style.opacity = '1', 10);
            } else {
                img.style.opacity = '0';
                img.style.display = 'none';
            }
        });
    }

    // שאר הלוגיקה נשארת זהה...
    function openLightbox(imgElement) {
        const lightbox = document.getElementById("lightbox");
        const lightboxImg = document.getElementById("lightboxImg");
        const lightboxCaption = document.getElementById("lightboxCaption");
        lightboxImg.src = imgElement.src;
        lightboxCaption.textContent = imgElement.getAttribute("caption") || "";
        lightbox.classList.add("activeLightbox");
    }
    function closeLightbox() { document.getElementById("lightbox").classList.remove("activeLightbox"); }
</script>

</body>
</html>
