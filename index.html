<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Timor Novoselsky</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@600&family=Lora&display=swap');

        body {
            background-color: black;
            color: white;
            margin: 0;
            padding: 20px;
            font-family: 'Lora', serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1000px;
        }
        .branding { text-align: left; }
        h1 { font-family: 'Caveat', cursive; font-size: 60px; margin: 0; }
        .subtitle { font-size: 16px; letter-spacing: 8px; text-transform: uppercase; margin-top: -5px; color: #aaa; }
        .navMenu { cursor: pointer; position: relative; font-size: 20px; letter-spacing: 2px; }
        .menuItems {
            opacity: 0; visibility: hidden; transition: opacity 0.4s ease;
            position: absolute; right: 0; top: 40px; background-color: #222; padding: 15px; min-width: 200px; z-index: 10;
        }
        .menuItems a { display: block; color: white; text-decoration: none; padding: 10px 0; font-size: 16px; }
        .showMenu { opacity: 1; visibility: visible; }
        
        /* המרווח צומצם ל-5 פיקסלים */
        .mainDisplay { width: 100%; max-width: 800px; height: 50vh; display: flex; justify-content: center; align-items: center; margin-top: 20px; }
        #slideImage { max-width: 100%; max-height: 100%; object-fit: cover; transition: opacity 0.8s ease-in-out; }
        
        .thumbnails { display: flex; justify-content: space-between; width: 100%; max-width: 800px; margin-top: 5px; gap: 5px; }
        .thumb { width: 33%; height: 120px; object-fit: cover; transition: opacity 0.8s ease-in-out; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <div class="branding">
        <h1>Timor Novoselsky</h1>
        <div class="subtitle">PHOTOGRAPHY</div>
    </div>
    <div class="navMenu" onclick="toggleMenu()">MENU
        <div id="dropdown" class="menuItems">
            <a href="wildlife.html">Wildlife</a> <!-- לינק לדף החדש -->
            <a href="#">Landscapes</a>
            <a href="#">People and Culture</a>
            <a href="#">Stories</a>
            <a href="#">About</a>
            <a href="#">Contact</a>
        </div>
    </div>
</header>

<div class="mainDisplay">
    <img id="slideImage" src="https://images.unsplash.com/photo-1506744038136-46273834b3fb" alt="Main">
</div>

<div class="thumbnails">
    <img id="thumb1" class="thumb" src="https://images.unsplash.com/photo-1470770841072-f978cf4d019e">
    <img id="thumb2" class="thumb" src="https://images.unsplash.com/photo-1501785888041-af3ef285b470">
    <img id="thumb3" class="thumb" src="https://images.unsplash.com/photo-1441974231531-c6227db76b6e">
</div>

<script>
    function toggleMenu() { document.getElementById("dropdown").classList.toggle("showMenu"); }
    const images = [ "https://images.unsplash.com/photo-1506744038136-46273834b3fb", "https://images.unsplash.com/photo-1470770841072-f978cf4d019e", "https://images.unsplash.com/photo-1501785888041-af3ef285b470", "https://images.unsplash.com/photo-1441974231531-c6227db76b6e", "https://images.unsplash.com/photo-1500673922987-e212871fec22" ];
    let index = 0;
    function updateGallery() {
        const elements = [document.getElementById("slideImage"), document.getElementById("thumb1"), document.getElementById("thumb2"), document.getElementById("thumb3")];
        elements.forEach(el => el.style.opacity = 0);
        setTimeout(() => {
            index = (index + 1) % images.length;
            elements[0].src = images[index];
            elements[1].src = images[(index + 1) % images.length];
            elements[2].src = images[(index + 2) % images.length];
            elements[3].src = images[(index + 3) % images.length];
            elements.forEach(el => el.style.opacity = 1);
        }, 800);
    }
    setInterval(updateGallery, 4000);
</script>
</body>
</html>
