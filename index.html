<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Timor Novoselsky</title>
    <style>
        body {
            background-color: black;
            color: white;
            margin: 0;
            padding: 20px;
            font-family: sans-serif;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .navMenu {
            cursor: pointer;
            position: relative;
            font-size: 18px;
            letter-spacing: 2px;
        }
        .menuItems {
            display: none;
            position: absolute;
            right: 0;
            top: 40px;
            background-color: #222;
            padding: 15px;
            min-width: 150px;
            z-index: 10;
        }
        .menuItems a {
            display: block;
            color: white;
            text-decoration: none;
            padding: 10px 0;
            font-size: 16px;
        }
        .showMenu {
            display: block;
        }
        .mainDisplay {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 80vh;
            margin-top: 20px;
        }
        #slideImage {
            max-width: 100%;
            max-height: 80vh;
            object-fit: contain;
        }
    </style>
</head>
<body>

<header>
    <h1>Timor Novoselsky</h1>
    <div class="navMenu" onclick="toggleMenu()">MENU
        <div id="dropdown" class="menuItems">
            <a href="#">Wildlife</a>
            <a href="#">Landscapes</a>
            <a href="#">Culture</a>
        </div>
    </div>
</header>

<div class="mainDisplay">
    <img id="slideImage" src="https://images.unsplash.com/photo-1506744038136-46273834b3fb" alt="Nature">
</div>

<script>
    function toggleMenu() {
        document.getElementById("dropdown").classList.toggle("showMenu");
    }

    const images = [
        "https://images.unsplash.com/photo-1506744038136-46273834b3fb",
        "https://images.unsplash.com/photo-1470770841072-f978cf4d019e",
        "https://images.unsplash.com/photo-1501785888041-af3ef285b470"
    ];
    let index = 0;
    const imgElement = document.getElementById("slideImage");

    setInterval(() => {
        index = (index + 1) % images.length;
        imgElement.src = images[index];
    }, 2000);
</script>

</body>
</html>
