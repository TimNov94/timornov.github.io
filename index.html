<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Timor Novoselsky</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@600&family=Lora&display=swap');

        body {
            background-color: black;
            color: white;
            margin: 0;
            padding: 20px;
            font-family: 'Lora', serif;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        h1 {
            font-family: 'Caveat', cursive;
            font-size: 60px; /* הגדלתי משמעותית */
            margin: 0;
        }
        .navMenu {
            cursor: pointer;
            position: relative;
            font-size: 20px;
            letter-spacing: 2px;
        }
        .menuItems {
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.4s ease; /* אנימציה חלקה לתפריט */
            position: absolute;
            right: 0;
            top: 40px;
            background-color: #222;
            padding: 15px;
            min-width: 200px;
            z-index: 10;
        }
        .menuItems a {
            display: block;
            color: white;
            text-decoration: none;
            padding: 10px 0;
            font-size: 16px;
        }
        .showMenu {
            opacity: 1;
            visibility: visible;
        }
        .mainDisplay {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 80vh;
            margin-top: 20px;
        }
        #slideImage {
            max-width: 100%;
            max-height: 80vh;
            object-fit: contain;
            transition: opacity 1s ease-in-out; /* אנימציה חלקה לתמונה */
            opacity: 1;
        }
    </style>
</head>
<body>

<header>
    <h1>Timor Novoselsky</h1>
    <div class="navMenu" onclick="toggleMenu()">MENU
        <div id="dropdown" class="menuItems">
            <a href="#">Wildlife</a>
            <a href="#">Landscapes</a>
            <a href="#">People and Culture</a>
            <a href="#">Stories</a>
            <a href="#">About</a>
            <a href="#">Contact</a>
        </div>
    </div>
</header>

<div class="mainDisplay">
    <img id="slideImage" src="https://images.unsplash.com/photo-1506744038136-46273834b3fb" alt="Nature">
</div>

<script>
    function toggleMenu() {
        document.getElementById("dropdown").classList.toggle("showMenu");
    }

    const images = [
        "https://images.unsplash.com/photo-1506744038136-46273834b3fb",
        "https://images.unsplash.com/photo-1470770841072-f978cf4d019e",
        "https://images.unsplash.com/photo-1501785888041-af3ef285b470"
    ];
    let index = 0;
    const imgElement = document.getElementById("slideImage");

    setInterval(() => {
        // אנימציה של התמונה - מעמעמים, מחליפים, ומחזירים
        imgElement.style.opacity = 0;
        setTimeout(() => {
            index = (index + 1) % images.length;
            imgElement.src = images[index];
            imgElement.style.opacity = 1;
        }, 1000); 
    }, 3000); // שיניתי ל-3 שניות כדי שיהיה זמן לאנימציה
</script>

</body>
</html>
