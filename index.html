<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Timor Novoselsky</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Lora&display=swap');

        body { background-color: black; color: white; margin: 0; padding: 20px; font-family: 'Lora', serif; display: flex; flex-direction: column; align-items: center; }
        .siteContainer { width: 100%; max-width: 800px; }
        
        /* ... (השארתי את העיצובים הקודמים של ה-Header והתפריט ללא שינוי כדי לשמור על יציבות) ... */
        h1 { font-family: 'Cormorant Garamond', serif; font-weight: 300; font-size: 42px; margin: 0; letter-spacing: 2px; }
        .subtitle { font-size: 12px; letter-spacing: 7px; text-transform: uppercase; margin-top: 5px; color: #888; }
        
        .mainDisplay { width: 100%; height: 480px; position: relative; margin-top: 50px; }
        .slideImg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; transition: opacity 2s ease-in-out; opacity: 0; }
        .slideImg.activeImg { opacity: 1; }
        
        .bioSection { margin: 60px 0; line-height: 1.8; color: #bbb; font-size: 16px; text-align: justify; }
        
        /* אזור התמונה האנכית החדש */
        .verticalFeature { 
            width: 100%; height: 700px; position: relative; margin: 50px 0; overflow: hidden; 
        }
        .verticalFeature img { width: 100%; height: 100%; object-fit: cover; }
        .gradientOverlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0.2) 100%);
        }

        /* עיצוב הבועה והמודל */
        .contactBubble {
            position: fixed; bottom: 30px; left: 30px; background-color: #222; /* שונה לאפור כהה */
            width: 55px; height: 55px; border-radius: 50%; display: flex; justify-content: center; align-items: center;
            cursor: pointer; z-index: 900; transition: transform 0.3s;
        }
        .contactBubble:hover { transform: scale(1.1); }
        .closeModalBtn { cursor: pointer; color: white; opacity: 0.5; font-size: 30px; margin-bottom: 10px; } /* 50% opacity */
        .closeModalBtn:hover { opacity: 1; }

        /* הפוטר החדש */
        footer { margin-top: 60px; padding: 40px 0; border-top: 1px solid #333; text-align: center; color: #666; font-size: 14px; }
        .footerLinks a { color: #888; text-decoration: none; margin: 0 10px; text-transform: uppercase; letter-spacing: 2px; }
    </style>
</head>
<body>

<div class="siteContainer">
    <!-- Header/Menu נשאר זהה -->
    <header>...</header>

    <div class="mainDisplay">
        <img id="slideImage1" class="slideImg activeImg" src="https://picsum.photos/800/600?random=50">
        <img id="slideImage2" class="slideImg" src="https://picsum.photos/800/600?random=51">
    </div>

    <div class="bioSection">... טקסט אודות ...</div>

    <div class="storiesSection">... סיפורים ...</div>

    <!-- התוספת החדשה: תמונת אורך גדולה -->
    <div class="verticalFeature">
        <div class="gradientOverlay"></div>
        <img src="https://picsum.photos/600/900?random=88" alt="Feature">
    </div>

    <!-- הפוטר -->
    <footer>
        <p>"Capturing the silence between the moments."</p>
        <div class="footerLinks">
            <a href="index.html">Home</a> | <a href="#" onclick="toggleMenu()">Menu</a>
        </div>
    </footer>
</div>

<!-- Contact Bubble -->
<div class="contactBubble" onclick="openContactModal()">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="white"><path d="..."/></svg>
</div>

<!-- Modal -->
<div id="contactModal" class="contactModal" onclick="closeContactModal(event)">
    <div class="modalContent" onclick="event.stopPropagation()">
        <div class="closeModalBtn" onclick="closeContactModal(true)">&times;</div>
        ... טופס ...
    </div>
</div>

<script>
    // ... (אותה לוגיקה)
    function closeContactModal(force=false, event=null) { 
        if(force || (event && event.target.classList.contains("contactModal"))) {
            document.getElementById("contactModal").classList.remove("activeModal"); 
        }
    }
</script>
</body>
</html>
