<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Timor Nocoselsky</title>
    <style>
        body {
            background-color: black;
            color: white;
            margin: 0;
            padding: 20px;
            font-family: sans-serif;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .navMenu {
            cursor: pointer;
        }
        .mainDisplay {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 80vh;
        }
        #slideImage {
            max-width: 100%;
            max-height: 80vh;
        }
    </style>
</head>
<body>

<header>
    <h1>Timor Nocoselsky</h1>
    <div class="navMenu">MENU</div>
</header>

<div class="mainDisplay">
    <img id="slideImage" src="https://images.unsplash.com/photo-1506744038136-46273834b3fb" alt="Nature">
</div>

<script>
    const images = [
        "https://images.unsplash.com/photo-1506744038136-46273834b3fb",
        "https://images.unsplash.com/photo-1470770841072-f978cf4d019e",
        "https://images.unsplash.com/photo-1501785888041-af3ef285b470"
    ];
    let index = 0;
    const imgElement = document.getElementById("slideImage");

    setInterval(() => {
        index = (index + 1) % images.length;
        imgElement.src = images[index];
    }, 2000);
</script>

</body>
</html>
