<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Timor Novoselsky</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Lora&display=swap');

        body {
            background-color: black;
            color: white;
            margin: 0;
            padding: 20px;
            font-family: 'Lora', serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .topVignette {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 50px;
            background: linear-gradient(to bottom, rgba(0,0,0,1), rgba(0,0,0,0));
            z-index: 1000;
            pointer-events: none;
        }

        .siteContainer {
            width: 100%;
            max-width: 800px;
        }
        
        header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 10px;
            margin-top: 20px;
        }
        
        .branding { text-align: left; }
        
        h1 { 
            font-family: 'Cormorant Garamond', serif; 
            font-weight: 300;
            font-size: 42px; 
            margin: 0; 
            letter-spacing: 2px;
        }
        .subtitle { font-size: 12px; letter-spacing: 7px; text-transform: uppercase; margin-top: 5px; color: #888; }
        
        .navControls {
            display: flex;
            align-items: center;
            gap: 25px;
            position: relative;
        }
        .navMenu { cursor: pointer; font-size: 16px; letter-spacing: 2px; z-index: 5; color: #aaa; transition: color 0.3s; }
        .navMenu:hover { color: white; }
        
        .langSelector { position: relative; cursor: pointer; display: flex; align-items: center; z-index: 5; }
        .globeIcon { width: 20px; height: 20px; opacity: 0.6; transition: opacity 0.2s; }
        .globeIcon:hover { opacity: 1; }
        
        .langDropdown {
            display: none; position: absolute; top: 35px; right: 0; background-color: #111;
            padding: 10px; min-width: 80px; box-shadow: 0 4px 15px rgba(0,0,0,0.8); z-index: 600;
        }
        .langDropdown.showLang { display: block; }
        .langDropdown a { display: block; color: #aaa; text-decoration: none; font-size: 13px; padding: 8px 0; letter-spacing: 1px; text-align: center; transition: color 0.2s; }
        .langDropdown a:hover { color: white; }

        .overlayMenu {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: black; z-index: 100; display: flex; flex-direction: column;
            justify-content: center; align-items: center; opacity: 0; visibility: hidden; transition: opacity 0.4s ease;
        }
        .overlayMenu.active { opacity: 1; visibility: visible; }
        .closeBtn { position: absolute; top: 30px; right: 30px; font-size: 40px; cursor: pointer; color: white; }
        
        .menuLinks { display: flex; flex-direction: column; text-align: center; }
        .menuLinks a { color: #aaa; text-decoration: none; font-size: 18px; letter-spacing: 3px; text-transform: uppercase; padding: 12px 0; transition: color 0.3s; }
        .menuLinks a:hover { color: white; }
        .menuLinks a.gapAfter { margin-bottom: 40px; }

        .mainDisplay { 
            width: 100%; 
            height: 480px; 
            position: relative; 
            margin-top: 50px; 
        }
        
        .slideImg { 
            position: absolute;
            top: 0;
            left: 0;
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            transition: opacity 2s ease-in-out; 
            opacity: 0; 
        }
        .slideImg.activeImg { opacity: 1; }
        
        .scrollReveal {
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 1s ease, transform 1s ease;
        }
        .scrollReveal.revealed {
            opacity: 1;
            transform: translateY(0);
        }
        
        .bioSection { margin: 50px 0; line-height: 1.8; color: #bbb; font-size: 15px; text-align: justify; }
        
        .storiesSection {
            display: flex;
            justify-content: space-between;
            width: 100%;
            margin-bottom: 80px;
            gap: 25px;
        }
        .storyCard {
            width: 31%;
            display: flex;
            flex-direction: column;
            cursor: pointer;
        }
        .storyImgWrapper {
            width: 100%;
            height: 140px;
            overflow: hidden;
        }
        .storyImg {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(30%);
            transition: transform 0.8s ease, filter 0.3s ease;
        }
        .storyCard:hover .storyImg { 
            filter: grayscale(0%); 
            transform: scale(1.04); 
        }
        .storyTitle {
            font-family: 'Cormorant Garamond', serif;
            font-size: 20px;
            margin: 12px 0 6px 0;
            letter-spacing: 1px;
        }
        .storySnippet {
            font-size: 13px;
            line-height: 1.6;
            color: #888;
        }

        .verticalFeature { 
            width: 100%; 
            height: 2400px; 
            position: relative; 
            margin: 80px 0 30px 0; 
            overflow: hidden; 
        }
        .verticalFeature img { width: 100%; height: 100%; object-fit: cover; }

            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%;
            background: linear-gradient(to bottom, rgba(0,0
